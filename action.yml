name: action-lambda-publish

author: Heron Labs

description: Update an AWS Lambda function container image to publish a new version.

inputs:
  AWS_ROLE_TO_ASSUME:
    description: "ARN of the IAM role to assume via OIDC."
    required: true
  AWS_REGION:
    description: "AWS region where the Lambda function lives."
    required: true
  AWS_ROLE_DURATION_SECONDS:
    description: "Duration in seconds for the assumed role session."
    required: true
  LAMBDA_IMAGE:
    description: "Full ECR image URI for the Lambda function (e.g., 123456789.dkr.ecr.us-east-1.amazonaws.com/my-image:tag)."
    required: true
  LAMBDA_NAME:
    description: "Name of the AWS Lambda function to update."
    required: true

runs:
  using: composite
  steps:
    - name: 'Configure AWS Credentials'
      uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
      with:
        aws-region: ${{ inputs.AWS_REGION }}
        role-to-assume: ${{ inputs.AWS_ROLE_TO_ASSUME }}
        role-duration-seconds: ${{ inputs.AWS_ROLE_DURATION_SECONDS }}
        role-session-name: action-lambda-publish-session

    - name: 'Publish to Lambda'
      shell: bash
      run: bash ${{ github.action_path }}/core/publish.sh
      env:
        LAMBDA_IMAGE: ${{ inputs.LAMBDA_IMAGE }}
        LAMBDA_NAME: ${{ inputs.LAMBDA_NAME }}
