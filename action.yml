name: action-lambda-publish

author: Heron Labs

description: Publish Lambda

inputs:
  AWS_ROLE_TO_ASSUME:
    description: inputs.AWS_ROLE_TO_ASSUME
    required: true
  AWS_REGION:
    description: inputs.AWS_REGION
    required: true
  AWS_ROLE_DURATION_SECONDS:
    description: inputs.AWS_ROLE_DURATION_SECONDS
    required: true
  LAMBDA_IMAGE:
    description: inputs.LAMBDA_IMAGE
    required: true
  LAMBDA_NAME:
    description: inputs.LAMBDA_NAME
    required: true

runs:
  using: composite
  steps:
    - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
      with:
        aws-region: ${{ inputs.AWS_REGION }}
        role-to-assume: ${{ inputs.AWS_ROLE_TO_ASSUME }}
        role-duration-seconds: ${{ inputs.AWS_ROLE_DURATION_SECONDS }}
        role-session-name: action-lambda-publish-session

    - name: 'Publish AWS Lambda function'
      shell: bash
      run: bash ${{ github.action_path }}/core/publish-lambda.sh
      env:
        LAMBDA_IMAGE: ${{ inputs.LAMBDA_IMAGE }}
        LAMBDA_NAME: ${{ inputs.LAMBDA_NAME }}
